<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            padding: 20px;
        }

        .item {
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;

        }

        .box {
            border: 2px solid black;
            padding: 20px;

        }

        main {
            display: grid;
            grid-column: 1 / span 3;
            grid-row: 2 / span 2;

        }

        .box.nth-child(1) {
            background-color: lightcoral;
            height: 100px;
        }


        <main><div class="box">1</div><div class="box">2</div><div class="box">3</div><div class="box"></div></main>
    </style>


</head>

<body>

</body>

</html>
